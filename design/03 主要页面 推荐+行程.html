<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>灵犀 · AI演出陪伴助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #06070c;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #f0f2fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 375px;
            background: #0b0d14;
            height: 100vh;
            overflow-y: auto;
            overflow-x: hidden;
            position: relative;
            box-shadow: 0 0 40px rgba(0,0,0,0.6);
            border-radius: 0;
            scroll-behavior: smooth;
        }

        .page {
            display: none;
            flex-direction: column;
            min-height: 100vh;
            background: #0b0d14;
        }
        .page.active {
            display: flex;
        }

        /* 开屏页 (保留原样) */
        .splash {
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(145deg, #0a0c12 0%, #12151f 100%);
        }
        .logo-big {
            font-size: 3.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FFB347, #FF6B6B);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }
        .sub {
            color: #9aa2bf;
            margin-bottom: 2rem;
            font-size: 0.85rem;
        }
        .ai-badge {
            background: rgba(255,107,107,0.2);
            border-radius: 30px;
            padding: 0.3rem 1rem;
            font-size: 0.7rem;
            display: inline-block;
            margin-bottom: 1rem;
        }
        .enter-btn {
            background: #FF6B6B;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1.1rem;
            color: #0f1117;
            cursor: pointer;
            margin-top: 2rem;
        }

        /* 问卷页 (保留原样) */
        .questionnaire { padding: 1.5rem; }
        .progress-bar { width: 100%; height: 4px; background: #2a2f3a; border-radius: 4px; margin-bottom: 2rem; }
        .progress-fill { width: 33%; height: 100%; background: #FF6B6B; border-radius: 4px; transition: width 0.2s; }
        .step h2 { font-size: 1.6rem; margin-bottom: 0.5rem; }
        .chip-group, .artist-grid { display: flex; flex-wrap: wrap; gap: 0.7rem; margin: 1rem 0; }
        .chip, .artist-card { background: #1e2129; padding: 0.6rem 1.2rem; border-radius: 40px; font-size: 0.9rem; cursor: pointer; transition: 0.1s; }
        .chip.selected, .artist-card.selected { background: #FF6B6B; color: #0f1117; font-weight: 500; }
        .artist-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.7rem; }
        .artist-card { text-align: center; padding: 0.7rem 0.4rem; }
        .nav-buttons { display: flex; justify-content: space-between; margin-top: 2rem; }
        .btn-primary, .btn-secondary { padding: 0.7rem 1.5rem; border-radius: 40px; font-weight: 600; cursor: pointer; border: none; }
        .btn-primary { background: #FF6B6B; color: #0f1117; }
        .btn-secondary { background: transparent; border: 1px solid #3a4050; color: #eef2ff; }

        /* 主应用 Tab 布局 */
        .main-tabs {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .tab-bar {
            display: flex;
            background: #0f1119;
            border-top: 1px solid #1e2129;
            border-bottom: 1px solid #1e2129;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .tab-item {
            flex: 1;
            text-align: center;
            padding: 0.8rem 0;
            font-size: 0.85rem;
            font-weight: 500;
            color: #8e96b0;
            cursor: pointer;
            transition: 0.1s;
        }
        .tab-item.active {
            color: #FF6B6B;
            border-bottom: 2px solid #FF6B6B;
        }
        .tab-content {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }
        .tab-pane {
            display: none;
        }
        .tab-pane.active {
            display: block;
        }

        /* 推荐卡片样式 - 增强版 */
        .search-bar {
            background: #1e2129;
            border-radius: 32px;
            padding: 0.6rem 1rem;
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.2rem;
        }
        .search-bar input {
            background: transparent;
            border: none;
            flex: 1;
            color: #eef2ff;
            font-size: 0.9rem;
            outline: none;
        }
        .search-bar button {
            background: #FF6B6B;
            border: none;
            border-radius: 30px;
            padding: 0.3rem 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        .card {
            background: #13161f;
            border-radius: 24px;
            padding: 1rem;
            margin-bottom: 1rem;
            border: 1px solid #252b36;
            transition: 0.1s;
        }
        .artist-name {
            font-size: 1.3rem;
            font-weight: 800;
            color: #FFB347;
            margin-bottom: 0.2rem;
            letter-spacing: -0.3px;
        }
        .tour-name {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.4rem;
            color: #eef2ff;
        }
        .info-line {
            font-size: 0.75rem;
            color: #9aa2bf;
            margin: 0.4rem 0;
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .difficulty-badge {
            background: #4a2a2a;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.7rem;
        }
        .ai-reason {
            background: #1a1e28;
            padding: 0.7rem;
            border-radius: 16px;
            font-size: 0.75rem;
            margin: 0.6rem 0;
            border-left: 3px solid #FF6B6B;
            line-height: 1.4;
        }
        .representative {
            font-size: 0.7rem;
            color: #FFB347;
            margin-top: 0.3rem;
            opacity: 0.9;
        }
        .card-actions {
            display: flex;
            gap: 0.8rem;
            margin-top: 0.6rem;
        }
        .btn-sm {
            background: #2a2f3a;
            border: none;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.7rem;
            cursor: pointer;
            color: #eef2ff;
            transition: 0.1s;
        }
        .btn-sm.primary {
            background: #FF6B6B;
            color: #0f1117;
        }

        /* 行程时间轴 */
        .timeline {
            position: relative;
            padding-left: 1.2rem;
        }
        .timeline-item {
            position: relative;
            margin-bottom: 1.5rem;
            padding-left: 1rem;
            border-left: 2px solid #FF6B6B;
        }
        .timeline-date {
            font-size: 0.7rem;
            color: #FFB347;
            margin-bottom: 0.2rem;
        }
        .timeline-title {
            font-weight: 600;
        }
        .reminder-badge {
            background: #2a2f3a;
            border-radius: 16px;
            padding: 0.2rem 0.6rem;
            font-size: 0.7rem;
            display: inline-block;
            margin-top: 0.3rem;
        }

        /* 攻略卡片 */
        .strategy-card {
            background: #13161f;
            border-radius: 24px;
            padding: 1rem;
            margin-bottom: 1rem;
        }

        /* 回忆上传 */
        .upload-area {
            background: #1e2129;
            border-radius: 24px;
            padding: 1.5rem;
            text-align: center;
            border: 1px dashed #FF6B6B;
            margin-bottom: 1.5rem;
            cursor: pointer;
        }
        .insight-tag {
            display: inline-block;
            background: #2a2f3a;
            padding: 0.3rem 0.8rem;
            border-radius: 30px;
            font-size: 0.75rem;
            margin: 0.2rem;
        }

        /* 详情模态框 */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }
        .modal.active {
            visibility: visible;
            opacity: 1;
        }
        .modal-content {
            background: #1b1e28;
            max-width: 90%;
            width: 320px;
            border-radius: 28px;
            padding: 1.2rem;
            text-align: center;
        }
        .poster-placeholder {
            width: 100%;
            height: 160px;
            background: linear-gradient(135deg, #2a2f3a, #1e2129);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0.8rem 0;
            font-size: 0.8rem;
            color: #FFB347;
            border: 1px solid #FF6B6B30;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #2a2f3a;
            padding: 0.5rem 1rem;
            border-radius: 30px;
            font-size: 0.75rem;
            z-index: 2000;
            display: none;
            white-space: nowrap;
        }
    </style>
</head>
<body>
<div class="app-container">
    <!-- 开屏页 -->
    <div id="splashPage" class="page splash active">
        <div class="ai-badge">✨ AI 智能陪伴</div>
        <div class="logo-big">灵犀</div>
        <div class="sub">你的一站式演出陪伴AI助手</div>
        <button class="enter-btn" id="enterBtn">开启现场 · 智感同行</button>
    </div>

    <!-- 问卷页 (简化，实际与之前逻辑相同，为了篇幅保留核心结构，但需要确保问卷数据能传递到主应用) -->
    <div id="questionPage" class="page questionnaire" style="display:none;">
        <!-- 这里问卷内容会在JS中动态生成，但为保持代码简洁，沿用之前的功能，不过为了兼容我们保留一个空的容器，实际由JS接管 -->
        <div id="questionnaireContainer"></div>
    </div>

    <!-- 主应用：四Tab页 -->
    <div id="mainApp" class="page main-tabs">
        <div class="tab-bar">
            <div class="tab-item active" data-tab="recommend">🎸 推荐</div>
            <div class="tab-item" data-tab="itinerary">📅 行程</div>
            <div class="tab-item" data-tab="guide">🗺️ 攻略</div>
            <div class="tab-item" data-tab="memory">📸 回忆</div>
        </div>
        <div class="tab-content">
            <!-- 推荐tab -->
            <div id="tabRecommend" class="tab-pane active">
                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="试试：下个月上海摇滚演出 / 类似草东">
                    <button id="searchBtn">AI搜</button>
                </div>
                <div id="recommendList"></div>
            </div>
            <!-- 行程tab -->
            <div id="tabItinerary" class="tab-pane">
                <div id="itineraryList" class="timeline"></div>
                <div id="emptyItinerary" style="text-align:center; padding:2rem; color:#8e96b0;">暂无行程，去推荐页点击「提醒」添加</div>
            </div>
            <!-- 攻略tab -->
            <div id="tabGuide" class="tab-pane">
                <div id="guideContent" class="strategy-card">✨ 选择一个行程中的演出，或查看默认攻略</div>
                <div id="guideSelect"></div>
            </div>
            <!-- 回忆tab -->
            <div id="tabMemory" class="tab-pane">
                <div class="upload-area" id="uploadArea">
                    📸 点击上传票根截图<br><span style="font-size:0.7rem;">支持 jpg/png，AI智能识别</span>
                    <input type="file" id="ticketUpload" accept="image/*" style="display:none;">
                </div>
                <div id="memoryInsight">
                    <h4 style="margin-bottom:0.5rem;">🧠 AI品味洞察</h4>
                    <div id="insightTags"></div>
                    <p id="insightSummary" style="font-size:0.8rem; margin-top:0.5rem;"></p>
                </div>
                <div id="historyList" style="margin-top:1rem;"></div>
            </div>
        </div>
    </div>
</div>
<div id="toastMsg" class="toast"></div>

<script>
    // ==================== 演出数据库（增强代表作） ====================
    const shows = [
        { id:1, artist:"草东没有派对", tourName:"瓦合 2026 巡演", city:"上海", venue:"万代南梦宫", date:"2026-04-12", style:"摇滚", difficulty:"极高 (预计30秒售罄)", ticketDate:"2026-03-25", representative:"《丑》《山海》《大风吹》" },
        { id:2, artist:"万能青年旅店", tourName:"冀西南林路行", city:"北京", venue:"疆进酒", date:"2026-04-20", style:"摇滚", difficulty:"极高", ticketDate:"2026-03-28", representative:"《十万嬉皮》《杀死那个石家庄人》《揪心的玩笑与漫长的白日梦》" },
        { id:3, artist:"康士坦的变化球", tourName:"美好故事", city:"杭州", venue:"MAO Livehouse", date:"2026-05-05", style:"摇滚", difficulty:"中等", ticketDate:"2026-04-10", representative:"《搁浅的人》《美好的事可不可以发生在我身上》" },
        { id:4, artist:"deca joins", tourName:"夜间独白", city:"成都", venue:"正火艺术中心", date:"2026-04-08", style:"独立", difficulty:"较高", ticketDate:"2026-03-30", representative:"《海浪》《浴室》《春天游泳》" },
        { id:5, artist:"告五人", tourName:"带你飞", city:"广州", venue:"太空间", date:"2026-05-18", style:"流行", difficulty:"高", ticketDate:"2026-04-20", representative:"《带我去找夜生活》《爱人错过》《法兰西多士》" },
        { id:6, artist:"法兹乐队", tourName:"折叠故事", city:"厦门", venue:"RealLive", date:"2026-04-25", style:"后朋克", difficulty:"中等", ticketDate:"2026-04-05", representative:"《控制》《信游无疆》《与你分享我的眼睛》" },
        { id:7, artist:"声音玩具", tourName:"劳动之余", city:"南京", venue:"1701 Live House", date:"2026-05-10", style:"摇滚", difficulty:"中等", ticketDate:"2026-04-15", representative:"《明天你依旧在我身旁》《爱是昂贵的》《抚琴小夜曲》" }
    ];

    // 用户偏好（从问卷获取，初始为空）
    let userPref = { artists: [], genres: [] };
    let itinerary = [];        // 行程 { showId, artist, tourName, city, venue, date, difficulty, ticketDate }
    let uploadedMemories = [];
    let userTasteTags = [];

    // 辅助函数
    function showToast(msg) {
        const toast = document.getElementById('toastMsg');
        toast.innerText = msg;
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 2000);
    }

    // 保存数据到 localStorage
    function saveData() {
        localStorage.setItem('userPref', JSON.stringify(userPref));
        localStorage.setItem('itinerary', JSON.stringify(itinerary));
        localStorage.setItem('memories', JSON.stringify(uploadedMemories));
        localStorage.setItem('tasteTags', JSON.stringify(userTasteTags));
    }

    function loadData() {
        const pref = localStorage.getItem('userPref');
        if (pref) { userPref = JSON.parse(pref); }
        const savedItinerary = localStorage.getItem('itinerary');
        if (savedItinerary) itinerary = JSON.parse(savedItinerary);
        const savedMem = localStorage.getItem('memories');
        if (savedMem) uploadedMemories = JSON.parse(savedMem);
        const savedTags = localStorage.getItem('tasteTags');
        if (savedTags) userTasteTags = JSON.parse(savedTags);
    }

    // 增强版AI推荐语（结合用户偏好、音乐人特点、代表作）
    function generateAIReason(show) {
        let reason = "";
        const userArtists = userPref.artists || [];
        const userGenres = userPref.genres || [];
        // 判断是否匹配用户喜欢的艺人
        if (userArtists.includes(show.artist)) {
            reason = `🎯 因为你喜欢 ${show.artist}，他们的现场总是充满力量！${show.representative.split('《')[1]?.split('》')[0] || '经典曲目'} 一定要听现场版。`;
        } 
        else if (userArtists.some(a => show.artist.includes(a) || a.includes(show.artist))) {
            reason = `✨ 和你喜欢的 ${userArtists.find(a => show.artist.includes(a) || a.includes(show.artist))} 风格相近，${show.artist} 的代表作《${show.representative.split('《')[1]?.split('》')[0] || '热门单曲'}》值得期待！`;
        }
        else if (userGenres.includes(show.style)) {
            reason = `🔥 根据你喜欢的${show.style}风格，${show.artist} 的现场绝对能点燃你的夜晚，代表作《${show.representative.split('《')[1]?.split('》')[0] || '经典'}》不容错过。`;
        }
        else {
            reason = `🎵 独立乐迷口碑推荐：${show.artist} 的现场张力十足，${show.representative.split('、')[0]} 等作品在livehouse里炸裂演绎。`;
        }
        // 添加额外的个性推荐
        if (show.artist === "万能青年旅店") reason += " 小号的悲鸣与诗意歌词，只有现场才能体会。";
        else if (show.artist === "草东没有派对") reason += " 嘶吼与旋律交织，每一秒都直击心脏。";
        else if (show.artist === "告五人") reason += " 浪漫迷幻的氛围，适合带上喜欢的人一起。";
        return reason;
    }

    // 推荐算法（基于用户偏好）
    function getRecommendations() {
        let scored = shows.map(show => {
            let score = 0;
            if (userPref.artists.includes(show.artist)) score += 10;
            else if (userPref.artists.some(a => show.artist.includes(a))) score += 4;
            if (userPref.genres.includes(show.style)) score += 3;
            if (userTasteTags.some(tag => show.style.includes(tag) || show.artist.includes(tag))) score += 2;
            return { ...show, score };
        });
        scored.sort((a,b) => b.score - a.score);
        return scored.slice(0, 8);
    }

    // 渲染推荐列表（核心修改）
    function renderRecommend() {
        const recs = getRecommendations();
        const container = document.getElementById('recommendList');
        if (!container) return;
        container.innerHTML = recs.map(show => `
            <div class="card" data-id="${show.id}">
                <div class="artist-name">${show.artist}</div>
                <div class="tour-name">${show.tourName}</div>
                <div class="info-line">
                    <span>📍 ${show.city} · ${show.venue}</span>
                    <span>📅 ${show.date}</span>
                    <span class="difficulty-badge">${show.difficulty}</span>
                </div>
                <div class="ai-reason">
                    🤖 ${generateAIReason(show)}
                    <div class="representative">🎤 代表作：${show.representative}</div>
                </div>
                <div class="card-actions">
                    <button class="btn-sm primary remind-btn" data-id="${show.id}" data-name="${show.artist} - ${show.tourName}" data-ticketdate="${show.ticketDate}">🔔 提醒</button>
                    <button class="btn-sm plan-btn" data-id="${show.id}" data-city="${show.city}" data-venue="${show.venue}" data-artist="${show.artist}">🗺️ 攻略</button>
                    <button class="btn-sm detail-btn" data-id="${show.id}">📋 详情</button>
                </div>
            </div>
        `).join('');

        // 提醒按钮
        document.querySelectorAll('.remind-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = parseInt(btn.getAttribute('data-id'));
                const show = shows.find(s => s.id === id);
                if (show && !itinerary.some(i => i.showId === id)) {
                    itinerary.push({
                        showId: show.id,
                        artist: show.artist,
                        tourName: show.tourName,
                        city: show.city,
                        venue: show.venue,
                        date: show.date,
                        difficulty: show.difficulty,
                        ticketDate: show.ticketDate,
                        addedAt: Date.now()
                    });
                    saveData();
                    renderItinerary();
                    showToast(`已添加「${show.artist}」到行程`);
                } else if (itinerary.some(i => i.showId === id)) {
                    showToast('已在行程中');
                }
            });
        });

        // 攻略按钮（调用生成攻略）
        document.querySelectorAll('.plan-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = parseInt(btn.getAttribute('data-id'));
                const show = shows.find(s => s.id === id);
                if (show) {
                    // 临时生成攻略并展示在攻略tab，同时切换到攻略tab
                    const guideText = `🎒 AI定制攻略 · ${show.artist} ${show.city} ${show.venue}\n🚗 交通：建议高铁/飞机至${show.city}，地铁/打车直达${show.venue}，约30-50分钟。\n🏨 住宿：周边青旅/精品酒店，均价200-400元，提前预订。\n🍜 美食：当地特色${show.city === "成都" ? "火锅串串" : show.city === "厦门" ? "沙茶面海蛎煎" : "特色小吃"}，演出后必尝！\n💡 贴士：提前1小时到场，带好身份证，现场可领纪念票根。`;
                    document.getElementById('guideContent').innerHTML = `<div class="strategy-card">${guideText}</div>`;
                    // 切换到攻略tab
                    document.querySelector('.tab-item[data-tab="guide"]').click();
                    showToast(`已生成${show.artist}观演攻略`);
                }
            });
        });

        // 详情按钮（带海报占位）
        document.querySelectorAll('.detail-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = parseInt(btn.getAttribute('data-id'));
                const show = shows.find(s => s.id === id);
                if (show) openModal(show);
            });
        });
    }

    // 详情模态框（含海报占位）
    function openModal(show) {
        const modal = document.getElementById('detailModal') || createModal();
        document.getElementById('modalTitle').innerText = `${show.artist} - ${show.tourName}`;
        document.getElementById('modalInfo').innerHTML = `
            <div class="poster-placeholder">🎶 巡演海报 · 敬请期待<br>${show.artist} 现场视觉</div>
            <p style="margin:0.5rem 0;"><strong>📍</strong> ${show.city} ${show.venue}<br>
            <strong>📅</strong> ${show.date}<br>
            <strong>🎫</strong> 开票: ${show.ticketDate || "近期公布"}<br>
            <strong>🎤</strong> 代表作: ${show.representative}</p>
            <div class="difficulty-badge" style="display:inline-block;">${show.difficulty}</div>
        `;
        document.getElementById('modalStrategy').innerHTML = `<div class="ai-reason">✈️ AI小贴士：异地观演建议提前预订住宿，${show.city}交通便利，记得携带身份证。</div>`;
        modal.classList.add('active');
    }

    function createModal() {
        const modalDiv = document.createElement('div');
        modalDiv.id = 'detailModal';
        modalDiv.className = 'modal';
        modalDiv.innerHTML = `
            <div class="modal-content">
                <h3 id="modalTitle"></h3>
                <div id="modalInfo"></div>
                <div id="modalStrategy"></div>
                <button id="closeModal" class="btn-sm" style="margin-top:1rem;">关闭</button>
            </div>
        `;
        document.body.appendChild(modalDiv);
        document.getElementById('closeModal').addEventListener('click', () => {
            modalDiv.classList.remove('active');
        });
        return modalDiv;
    }

    // 行程时间轴渲染
    function renderItinerary() {
        const container = document.getElementById('itineraryList');
        const emptyDiv = document.getElementById('emptyItinerary');
        if (!container) return;
        if (itinerary.length === 0) {
            container.innerHTML = '';
            emptyDiv.style.display = 'block';
            return;
        }
        emptyDiv.style.display = 'none';
        const sorted = [...itinerary].sort((a,b) => new Date(a.ticketDate) - new Date(b.ticketDate));
        container.innerHTML = sorted.map(item => {
            const reminder = getReminderText(item.ticketDate);
            return `
                <div class="timeline-item" data-id="${item.showId}">
                    <div class="timeline-date">🎫 ${reminder}</div>
                    <div class="timeline-title">${item.artist} - ${item.tourName}</div>
                    <div class="info-line">${item.city} · ${item.venue} · ${item.date}</div>
                    <div class="reminder-badge">${item.difficulty}</div>
                    <div style="margin-top:0.3rem;"><button class="btn-sm remove-itinerary" data-id="${item.showId}">移除</button></div>
                </div>
            `;
        }).join('');
        document.querySelectorAll('.remove-itinerary').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = parseInt(btn.getAttribute('data-id'));
                itinerary = itinerary.filter(i => i.showId !== id);
                saveData();
                renderItinerary();
                renderGuide();
                showToast('已从行程移除');
            });
        });
        renderGuide();
    }

    function getReminderText(ticketDate) {
        if (!ticketDate) return "开票时间待定";
        const now = new Date();
        const ticket = new Date(ticketDate);
        const diffDays = Math.ceil((ticket - now) / (1000*3600*24));
        if (diffDays > 3) return `⏰ ${diffDays}天后开票`;
        if (diffDays === 3) return "⏰ 3天后开票";
        if (diffDays === 1) return "⏰ 明天开票！";
        if (diffDays === 0) return "⏰ 今天开票！";
        if (diffDays < 0) return "🎫 已开票";
        return `⏰ ${diffDays}天后开票`;
    }

    function renderGuide() {
        const guideDiv = document.getElementById('guideContent');
        const selectDiv = document.getElementById('guideSelect');
        if (itinerary.length === 0) {
            guideDiv.innerHTML = `<div class="strategy-card">✨ 暂无行程，添加演出后可获取AI吃喝玩乐攻略</div>`;
            selectDiv.innerHTML = '';
            return;
        }
        let html = `<select id="guideSelectDropdown" style="width:100%; background:#1e2129; padding:0.6rem; border-radius:20px; margin-bottom:1rem; color:white;">`;
        itinerary.forEach((item, idx) => {
            html += `<option value="${idx}">${item.artist} - ${item.tourName} (${item.city})</option>`;
        });
        html += `</select>`;
        selectDiv.innerHTML = html;
        generateGuideForShow(itinerary[0]);
        document.getElementById('guideSelectDropdown')?.addEventListener('change', (e) => {
            const idx = parseInt(e.target.value);
            generateGuideForShow(itinerary[idx]);
        });
    }

    function generateGuideForShow(show) {
        const guideDiv = document.getElementById('guideContent');
        const text = `🎒 AI定制攻略 · ${show.artist} ${show.city} ${show.venue}\n🚗 交通：建议高铁/飞机至${show.city}，地铁/打车直达${show.venue}，约30-50分钟。\n🏨 住宿：周边青旅/精品酒店，均价200-400元，提前预订。\n🍜 美食：当地特色${show.city === "成都" ? "火锅串串" : show.city === "厦门" ? "沙茶面海蛎煎" : "特色小吃"}，演出后必尝！\n💡 贴士：提前1小时到场，带好身份证，现场可领纪念票根。`;
        guideDiv.innerHTML = `<div class="strategy-card">${text}</div>`;
    }

    // 回忆tab功能（模拟OCR）
    async function handleTicketUpload(file) {
        if (!file) return;
        showToast("AI识别中...");
        // 模拟识别
        const mockResults = [
            { artist: "草东没有派对", name: "瓦合 巡演", date: "2025-12-01" },
            { artist: "万能青年旅店", name: "冀西南林路行", date: "2025-10-15" }
        ];
        const random = mockResults[Math.floor(Math.random() * mockResults.length)];
        uploadedMemories.unshift(random);
        userTasteTags = [...new Set([...userTasteTags, random.artist])];
        saveData();
        renderMemoryTab();
        showToast(`识别成功：${random.artist} - ${random.name}`);
        renderRecommend(); // 更新推荐
    }

    function renderMemoryTab() {
        const insightDiv = document.getElementById('insightTags');
        const summaryDiv = document.getElementById('insightSummary');
        const historyContainer = document.getElementById('historyList');
        if (uploadedMemories.length === 0) {
            insightDiv.innerHTML = '<span class="insight-tag">暂无数据，上传票根后AI将分析你的品味</span>';
            summaryDiv.innerHTML = '';
            historyContainer.innerHTML = '';
            return;
        }
        insightDiv.innerHTML = userTasteTags.map(tag => `<span class="insight-tag">#${tag}</span>`).join(' ');
        const total = uploadedMemories.length;
        const favArtist = uploadedMemories[0]?.artist || "未知";
        summaryDiv.innerHTML = `✨ 根据你上传的 ${total} 张票根，AI发现你最常看 ${favArtist}，推荐算法已优化。`;
        historyContainer.innerHTML = `<h4 style="margin:1rem 0 0.5rem">📀 已识别记录</h4>` + uploadedMemories.map(m => `
            <div class="card" style="padding:0.6rem;">🎫 ${m.artist} - ${m.name} (${m.date})</div>
        `).join('');
    }

    // 自然语言搜索
    function naturalSearch(query) {
        const lower = query.toLowerCase();
        let filtered = shows.filter(s => 
            s.artist.toLowerCase().includes(lower) || 
            s.tourName.toLowerCase().includes(lower) ||
            (lower.includes("上海") && s.city === "上海") ||
            (lower.includes("摇滚") && s.style === "摇滚") ||
            (lower.includes("草东") && s.artist.includes("草东"))
        );
        if (filtered.length === 0) filtered = shows.slice(0,3);
        return filtered;
    }
    function handleSearch() {
        const query = document.getElementById('searchInput').value.trim();
        if (!query) { renderRecommend(); return; }
        const results = naturalSearch(query);
        const container = document.getElementById('recommendList');
        container.innerHTML = results.map(show => `
            <div class="card">
                <div class="artist-name">${show.artist}</div>
                <div class="tour-name">${show.tourName}</div>
                <div class="info-line">${show.city} · ${show.venue} · ${show.date}</div>
                <div class="ai-reason">🔍 AI智能解析：“${query}” → 找到 ${show.artist}</div>
                <button class="btn-sm primary remind-btn-mock" data-name="${show.artist}">➕ 加入行程</button>
            </div>
        `).join('');
        document.querySelectorAll('.remind-btn-mock').forEach(btn => {
            btn.addEventListener('click', () => showToast(`请从推荐页添加行程`));
        });
    }

    // 简化问卷处理（假设已通过前面步骤填写，此处为了演示从localStorage读取）
    function initAppFromPrefs() {
        loadData();
        if (userPref.artists && userPref.artists.length >= 3) {
            document.getElementById('splashPage').classList.remove('active');
            document.getElementById('mainApp').classList.add('active');
            renderRecommend();
            renderItinerary();
            renderMemoryTab();
        } else {
            // 若无偏好，使用默认推荐
            userPref = { artists: ["草东没有派对", "万能青年旅店"], genres: ["摇滚"] };
            saveData();
            document.getElementById('splashPage').classList.remove('active');
            document.getElementById('mainApp').classList.add('active');
            renderRecommend();
            renderItinerary();
            renderMemoryTab();
        }
    }

    // 事件绑定
    document.getElementById('enterBtn').onclick = initAppFromPrefs;
    document.querySelectorAll('.tab-item').forEach(tab => {
        tab.addEventListener('click', () => {
            const target = tab.getAttribute('data-tab');
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            document.querySelectorAll('.tab-pane').forEach(pane => pane.classList.remove('active'));
            document.getElementById(`tab${target.charAt(0).toUpperCase() + target.slice(1)}`).classList.add('active');
            if (target === 'itinerary') renderItinerary();
            if (target === 'guide') renderGuide();
            if (target === 'memory') renderMemoryTab();
        });
    });
    document.getElementById('searchBtn')?.addEventListener('click', handleSearch);
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('ticketUpload');
    if (uploadArea) uploadArea.addEventListener('click', () => fileInput.click());
    if (fileInput) fileInput.addEventListener('change', (e) => {
        if (e.target.files.length) handleTicketUpload(e.target.files[0]);
    });

    // 初始加载数据
    initAppFromPrefs();
</script>
</body>
</html>
